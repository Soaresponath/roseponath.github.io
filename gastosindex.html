<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Gastos</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #222;
    }
    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 16px;
    }
    .titulo {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 18px;
    }
    .painel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .topo-card {
      padding: 14px 18px;
      font-size: 20px;
      font-weight: bold;
      background: #3a3a3a;
      color: #fff;
    }
    .grid-principal {
      display: grid;
      grid-template-columns: 220px 1fr 220px;
    }
    .secao {
      min-height: 100%;
      border-right: 1px solid #d9d9d9;
    }
    .secao:last-child { border-right: none; }
    .cabecalho {
      text-align: center;
      font-weight: bold;
      padding: 12px;
      color: #111;
      border-bottom: 2px solid #999;
    }
    .entrada { background: #26d645; }
    .despesa { background: #f39c12; }
    .saida { background: #ffffff; }

    .lista-valores {
      width: 100%;
      border-collapse: collapse;
    }
    .lista-valores td, .lista-valores th {
      border-bottom: 1px solid #ddd;
      padding: 8px;
      font-size: 16px;
    }
    .lista-valores input {
      width: 100%;
      border: 1px solid #bbb;
      border-radius: 6px;
      padding: 7px;
      font-size: 15px;
    }
    .valor-entrada {
      color: #128c2a;
      font-weight: bold;
    }
    .valor-saida {
      text-align: right;
      font-weight: bold;
    }
    .acoes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 16px;
      border-top: 1px solid #e3e3e3;
      background: #fafafa;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-add { background: #26d645; color: #fff; }
    .btn-salvar { background: #2d89ef; color: #fff; }
    .btn-limpar { background: #e74c3c; color: #fff; }
    .btn-pdf { background: #6c5ce7; color: #fff; }

    .resumo {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 18px;
    }
    .box {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .box h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .numero {
      font-size: 28px;
      font-weight: bold;
    }
    .verde { color: #138a2e; }
    .vermelho { color: #d63031; }
    .azul { color: #2d6cdf; }

    .linha-total {
      background: #f5f5f5;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .grid-principal {
        grid-template-columns: 1fr;
      }
      .secao {
        border-right: none;
        border-bottom: 1px solid #d9d9d9;
      }
      .secao:last-child { border-bottom: none; }
      .resumo {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .resumo {
        grid-template-columns: 1fr;
      }
      .titulo {
        font-size: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="titulo">Controle de Gastos Mensal</div>

    <div class="card">
      <div class="topo-card">Organizador Financeiro</div>

      <div class="grid-principal">
        <div class="secao">
          <div class="cabecalho entrada">Entrada</div>
          <table class="lista-valores" id="tabelaEntradas">
            <tbody>
              <tr>
                <td><input type="text" placeholder="Descrição" value="Entrada 1"></td>
                <td><input type="number" step="0.01" placeholder="Valor" class="campo-entrada" value="3359.92"></td>
              </tr>
              <tr>
                <td><input type="text" placeholder="Descrição" value="Entrada 2"></td>
                <td><input type="number" step="0.01" placeholder="Valor" class="campo-entrada" value="2998.83"></td>
              </tr>
              <tr>
                <td><input type="text" placeholder="Descrição" value="Entrada extra"></td>
                <td><input type="number" step="0.01" placeholder="Valor" class="campo-entrada" value="0"></td>
              </tr>
            </tbody>
            <tfoot>
              <tr class="linha-total">
                <td>Total</td>
                <td class="valor-entrada" id="totalEntradas">R$ 0,00</td>
              </tr>
            </tfoot>
          </table>
        </div>

        <div class="secao">
          <div class="cabecalho despesa">Despesas</div>
          <table class="lista-valores" id="tabelaDespesas">
            <tbody>
              <tr><td><input type="text" value="Dízimo"></td><td><input type="number" step="0.01" class="campo-saida" value="850"></td></tr>
              <tr><td><input type="text" value="Oferta igreja"></td><td><input type="number" step="0.01" class="campo-saida" value="100"></td></tr>
              <tr><td><input type="text" value="A esperança"></td><td><input type="number" step="0.01" class="campo-saida" value="80"></td></tr>
              <tr><td><input type="text" value="Cart. Nubank"></td><td><input type="number" step="0.01" class="campo-saida" value="2380.8"></td></tr>
              <tr><td><input type="text" value="Celular Vivo"></td><td><input type="number" step="0.01" class="campo-saida" value="70"></td></tr>
              <tr><td><input type="text" value="Internet"></td><td><input type="number" step="0.01" class="campo-saida" value="49"></td></tr>
              <tr><td><input type="text" value="Energia"></td><td><input type="number" step="0.01" class="campo-saida" value="97.19"></td></tr>
              <tr><td><input type="text" value="Nubank Box"></td><td><input type="number" step="0.01" class="campo-saida" value="0"></td></tr>
              <tr><td><input type="text" value="Comb. Moto"></td><td><input type="number" step="0.01" class="campo-saida" value="0"></td></tr>
              <tr><td><input type="text" value="Gasolina C."></td><td><input type="number" step="0.01" class="campo-saida" value="150"></td></tr>
              <tr><td><input type="text" value="S. Banestes"></td><td><input type="number" step="0.01" class="campo-saida" value="150.07"></td></tr>
              <tr><td><input type="text" value="Dentista"></td><td><input type="number" step="0.01" class="campo-saida" value="0"></td></tr>
              <tr><td><input type="text" value="Ração Bono"></td><td><input type="number" step="0.01" class="campo-saida" value="0"></td></tr>
              <tr><td><input type="text" value="Merc. Pago"></td><td><input type="number" step="0.01" class="campo-saida" value="1161.95"></td></tr>
              <tr><td><input type="text" value="Financiamento"></td><td><input type="number" step="0.01" class="campo-saida" value="1293.11"></td></tr>
              <tr><td><input type="text" value="Empréstimo"></td><td><input type="number" step="0.01" class="campo-saida" value="210.88"></td></tr>
              <tr><td><input type="text" value="Faculdade"></td><td><input type="number" step="0.01" class="campo-saida" value="184.93"></td></tr>
              <tr><td><input type="text" value="Batom"></td><td><input type="number" step="0.01" class="campo-saida" value="53.9"></td></tr>
            </tbody>
            <tfoot>
              <tr class="linha-total">
                <td>Total</td>
                <td class="valor-saida vermelho" id="totalSaidas">R$ 0,00</td>
              </tr>
            </tfoot>
          </table>
        </div>

        <div class="secao">
          <div class="cabecalho saida">Resumo</div>
          <table class="lista-valores">
            <tbody>
              <tr>
                <td>Data</td>
                <td id="dataAtual"></td>
              </tr>
              <tr>
                <td>Entradas</td>
                <td class="valor-entrada" id="resumoEntradas">R$ 0,00</td>
              </tr>
              <tr>
                <td>Saídas</td>
                <td class="vermelho valor-saida" id="resumoSaidas">R$ 0,00</td>
              </tr>
              <tr>
                <td>Sobrou</td>
                <td class="azul valor-saida" id="sobrou">R$ 0,00</td>
              </tr>
              <tr>
                <td>Status</td>
                <td id="statusFinanceiro">Organizado</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="acoes">
        <button class="btn-add" onclick="adicionarEntrada()">+ Adicionar entrada</button>
        <button class="btn-add" onclick="adicionarDespesa()">+ Adicionar despesa</button>
        <button class="btn-salvar" onclick="salvarDados()">💾 Salvar</button>
        <button class="btn-pdf" onclick="window.print()">📄 Gerar PDF</button>
        <button class="btn-limpar" onclick="limparTudo()">🗑️ Limpar</button>
      </div>
    </div>

    <div class="resumo">
      <div class="box">
        <h3>Total de entradas</h3>
        <div class="numero verde" id="boxEntradas">R$ 0,00</div>
      </div>
      <div class="box">
        <h3>Total de despesas</h3>
        <div class="numero vermelho" id="boxSaidas">R$ 0,00</div>
      </div>
      <div class="box">
        <h3>Saldo final</h3>
        <div class="numero azul" id="boxSaldo">R$ 0,00</div>
      </div>
      <div class="box">
        <h3>Mensagem</h3>
        <div id="mensagemFinal">Acompanhe seus gastos com atenção.</div>
      </div>
    </div>
  </div>

  <script>
    function formatarMoeda(valor) {
      return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function somarCampos(classe) {
      let total = 0;
      document.querySelectorAll('.' + classe).forEach(campo => {
        total += Number(campo.value) || 0;
      });
      return total;
    }

    function atualizarTotais() {
      const entradas = somarCampos('campo-entrada');
      const saidas = somarCampos('campo-saida');
      const saldo = entradas - saidas;

      document.getElementById('totalEntradas').textContent = formatarMoeda(entradas);
      document.getElementById('totalSaidas').textContent = formatarMoeda(saidas);
      document.getElementById('resumoEntradas').textContent = formatarMoeda(entradas);
      document.getElementById('resumoSaidas').textContent = formatarMoeda(saidas);
      document.getElementById('sobrou').textContent = formatarMoeda(saldo);
      document.getElementById('boxEntradas').textContent = formatarMoeda(entradas);
      document.getElementById('boxSaidas').textContent = formatarMoeda(saidas);
      document.getElementById('boxSaldo').textContent = formatarMoeda(saldo);

      const sobrou = document.getElementById('sobrou');
      const boxSaldo = document.getElementById('boxSaldo');
      const status = document.getElementById('statusFinanceiro');
      const mensagem = document.getElementById('mensagemFinal');

      if (saldo < 0) {
        sobrou.className = 'vermelho valor-saida';
        boxSaldo.className = 'numero vermelho';
        status.textContent = 'Atenção';
        mensagem.textContent = 'Suas despesas estão maiores que suas entradas.';
      } else if (saldo === 0) {
        sobrou.className = 'azul valor-saida';
        boxSaldo.className = 'numero azul';
        status.textContent = 'No limite';
        mensagem.textContent = 'Você zerou o saldo do mês.';
      } else {
        sobrou.className = 'azul valor-saida';
        boxSaldo.className = 'numero azul';
        status.textContent = 'Organizado';
        mensagem.textContent = 'Você ainda tem valor disponível no mês.';
      }

      salvarAutomaticoSilencioso();
    }

    function adicionarEntrada() {
      const tbody = document.querySelector('#tabelaEntradas tbody');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" placeholder="Descrição"></td>
        <td><input type="number" step="0.01" placeholder="Valor" class="campo-entrada" value="0"></td>
      `;
      tbody.appendChild(tr);
      configurarEventos();
      atualizarTotais();
    }

    function adicionarDespesa() {
      const tbody = document.querySelector('#tabelaDespesas tbody');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" placeholder="Despesa"></td>
        <td><input type="number" step="0.01" placeholder="Valor" class="campo-saida" value="0"></td>
      `;
      tbody.appendChild(tr);
      configurarEventos();
      atualizarTotais();
    }

    function coletarTabela(idTabela) {
      const linhas = document.querySelectorAll(`#${idTabela} tbody tr`);
      return Array.from(linhas).map(linha => {
        const inputs = linha.querySelectorAll('input');
        return {
          descricao: inputs[0].value,
          valor: inputs[1].value
        };
      });
    }

    function salvarDados() {
      const dados = {
        entradas: coletarTabela('tabelaEntradas'),
        despesas: coletarTabela('tabelaDespesas')
      };
      localStorage.setItem('controleGastosRose', JSON.stringify(dados));
      alert('Dados salvos com sucesso.');
    }

    function salvarAutomaticoSilencioso() {
      const dados = {
        entradas: coletarTabela('tabelaEntradas'),
        despesas: coletarTabela('tabelaDespesas')
      };
      localStorage.setItem('controleGastosRose', JSON.stringify(dados));
    }

    function carregarDados() {
      const dados = JSON.parse(localStorage.getItem('controleGastosRose'));
      if (!dados) return;

      const tbodyEntradas = document.querySelector('#tabelaEntradas tbody');
      const tbodyDespesas = document.querySelector('#tabelaDespesas tbody');
      tbodyEntradas.innerHTML = '';
      tbodyDespesas.innerHTML = '';

      dados.entradas.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input type="text" value="${item.descricao ?? ''}"></td>
          <td><input type="number" step="0.01" class="campo-entrada" value="${item.valor ?? 0}"></td>
        `;
        tbodyEntradas.appendChild(tr);
      });

      dados.despesas.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input type="text" value="${item.descricao ?? ''}"></td>
          <td><input type="number" step="0.01" class="campo-saida" value="${item.valor ?? 0}"></td>
        `;
        tbodyDespesas.appendChild(tr);
      });
    }

    function limparTudo() {
      if (!confirm('Deseja apagar todos os dados da página?')) return;
      localStorage.removeItem('controleGastosRose');
      location.reload();
    }

    function configurarEventos() {
      document.querySelectorAll('input').forEach(input => {
        input.removeEventListener('input', atualizarTotais);
        input.addEventListener('input', atualizarTotais);
      });
    }

    const hoje = new Date();
    document.getElementById('dataAtual').textContent = hoje.toLocaleDateString('pt-BR');

    carregarDados();
    configurarEventos();
    atualizarTotais();
  </script>
</body>
</html>
